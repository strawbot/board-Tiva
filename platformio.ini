[tivaware]
dir = /Users/robchapm/ti/TivaWare_C_Series-2.2.0.295

[env:mini_m4_tiva]
platform = titiva
board = lptm4c123gh6pm
platform_packages = toolchain-gccarmnoneeabi@~1.90201.0

extra_scripts =
    pre:extra_script.py
    post:upload_override.py

debug_tool = custom
debug_server =
    openocd
    -f
    openocd.cfg

debug_load_mode = always

upload_command = openocd
    -f openocd.cfg
    -c "program .pio/build/mini_m4_tiva/firmware.elf verify"
    -c "shutdown"

debug_port = localhost:3333

debug_svd_path = sysconfig/TM4C123GH6PM.svd

debug_init_cmds =
    define pio_reset_halt_target
      monitor reset halt
    end
    define pio_reset_run_target
      monitor reset halt
      continue
    end
    target extended-remote localhost:3333
    monitor halt
    $LOAD_CMDS
    pio_reset_halt_target

upload_protocol = custom

board_debug.jlink.device = TM4C123GH6PM
board_debug.jlink.interface = swd
board_debug.jlink.speed = 4000

board_build.ldscript = linker.ld

build_flags =
    -DPART_TM4C123GH6PM
    -DTARGET_IS_TM4C123_RB1
    -I${tivaware.dir}
    -I${tivaware.dir}/driverlib
    -Isysconfig
    -Iinclude
    -I../TimbreOS
    -I../Robot/diagnostics/canary
    ; lwIP core headers (board-agnostic, lives in Robot/)
    -I../Robot/net/lwip/src/include
    ; lwIP port layer: lwipopts.h + arch/cc.h + arch/sys_arch.h live in include/
    -Iinclude
    ; Robot HTTP module
    -I../Robot/net/http
    ; Robot diagnostics
    -I../Robot/diagnostics/show_ip
    -I../Robot/diagnostics/show_net
    -I../Robot/diagnostics/show_http
    -mfpu=fpv4-sp-d16
    -mfloat-abi=hard
    -mcpu=cortex-m4
    -mthumb
    -L${tivaware.dir}/driverlib/gcc
    -ldriver
    -lm
    -Wl,--no-warn-mismatch
    -Wl,-Map,.pio/build/mini_m4_tiva/firmware.map

; src/ + sysconfig/ + TimbreOS + Robot modules + lwIP core
; Excluded:
;   printersHost.c  — host stdio replacement, not for embedded
;   timestamp.c     — tea.c owns getTime(); our get_ticks() in clocks.c drives it
;   float.c         — pulls in math.h/stdio.h; float CLI not needed yet
;   lwip api/       — netconn/socket API not needed (NO_SYS=1, raw API only)
build_src_filter =
    +<*>
    +<../sysconfig/*.c>
    +<../../TimbreOS/*.c>
    +<../../Robot/diagnostics/canary/*.c>
    +<../../Robot/net/http/*.c>
    +<../../Robot/net/lwip/src/core/*.c>
    +<../../Robot/net/lwip/src/core/ipv4/*.c>
    +<../../Robot/net/lwip/src/netif/ethernet.c>
    +<../../Robot/net/lwip/src/apps/mdns/mdns.c>
    +<../../Robot/diagnostics/show_ip/*.c>
    +<../../Robot/diagnostics/show_net/*.c>
    +<../../Robot/diagnostics/show_http/*.c>
    -<../../TimbreOS/printersHost.c>
    -<../../TimbreOS/timestamp.c>
    -<../../TimbreOS/float.c>
